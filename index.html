<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>국방헬프콜 1303</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #1c1c1c;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 420px;
  margin: 0 auto;
  overflow-x: hidden;
}

/* ── Top yellow header ── */
.top-header {
  background: #c9961e;
  padding: 10px 14px 12px;
}

.top-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.menu-btn {
  background: rgba(0,0,0,0.25);
  color: #fff;
  border: none;
  padding: 5px 14px;
  border-radius: 5px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

.bell-wrap { position: relative; cursor: pointer; }
.bell-dot {
  position: absolute;
  top: 0; right: 0;
  width: 9px; height: 9px;
  background: #e53935;
  border-radius: 50%;
}

.header-info {
  font-size: 14px;
  font-weight: bold;
  color: #111;
  line-height: 1.7;
}

.support-title {
  font-size: 13px;
  font-weight: bold;
  color: #111;
  margin-top: 2px;
}

.support-num {
  font-size: 14px;
  font-weight: bold;
  color: #111;
}

.support-hours {
  font-size: 12px;
  color: #333;
}

/* ── Logo band ── */
.logo-band {
  background: #1c1c1c;
  display: block;
  line-height: 0;
}

.logo-band img {
  width: 100%;
  display: block;
}

/* ── Main dark area ── */
.main-area {
  background: #1c1c1c;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 20px 16px;
}

.ring-wrapper {
  position: relative;
  width: 280px;
  height: 280px;
}

#ring-svg {
  width: 100%;
  height: 100%;
  display: block;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.ring-group {
  animation: spin 12s linear infinite;
  transform-origin: 140px 140px;
}

.center-content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.days-lbl {
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
}

.time-lbl {
  color: #fff;
  font-size: 24px;
  font-weight: bold;
  letter-spacing: 3px;
  text-align: center;
}

/* ── Warning box ── */
.warning-box {
  background: #b71c1c;
  margin: 0 14px 10px;
  padding: 11px 14px;
  border-radius: 7px;
  color: #fff;
  font-size: 13px;
  line-height: 1.65;
  text-align: center;
}

/* ── Buttons ── */
.btn-row {
  display: flex;
  gap: 10px;
  padding: 0 14px 12px;
}

.cam-btn {
  flex: 1;
  background: #2c2c2c;
  border: 1px solid #484848;
  color: #fff;
  padding: 13px 8px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: bold;
  text-align: center;
  cursor: pointer;
  line-height: 1.55;
  user-select: none;
}

.cam-btn .sub {
  color: #aaa;
  font-size: 12px;
  font-weight: normal;
}

.version {
  color: #666;
  font-size: 12px;
  text-align: center;
  padding-bottom: 14px;
}
</style>
</head>

<script>
  /* ── Build rotating ring segments ── */
  (function () {
    const g   = document.getElementById('ring-group');
    const cx  = 140, cy = 140;
    const R   = 122;          // ring radius
    const N   = 32;           // number of segments
    const W   = 15, H = 13;  // segment width × height

    for (let i = 0; i < N; i++) {
      const angleDeg = (i / N) * 360;
      const angleRad = (angleDeg - 90) * Math.PI / 180;
      const x = cx + R * Math.cos(angleRad);
      const y = cy + R * Math.sin(angleRad);

      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x',         x - W / 2);
      rect.setAttribute('y',         y - H / 2);
      rect.setAttribute('width',     W);
      rect.setAttribute('height',    H);
      rect.setAttribute('rx',        2.5);
      rect.setAttribute('fill',      '#545454');
      rect.setAttribute('transform', `rotate(${angleDeg}, ${x}, ${y})`);
      g.appendChild(rect);
    }
  })();

  /* ── Live timer (counts up) ── */
  const t0 = Date.now();

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const s    = Math.floor((Date.now() - t0) / 1000);
    const days = Math.floor(s / 86400);
    const hh   = Math.floor((s % 86400) / 3600);
    const mm   = Math.floor((s % 3600)  / 60);
    const ss   = s % 60;

    document.getElementById('days-lbl').textContent = days + ' 일';
    document.getElementById('time-lbl').textContent =
      pad(hh) + ':' + pad(mm) + ':' + pad(ss);
  }

  setInterval(tick, 1000);
  tick();
</script>
